<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 44px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 23px; font-weight: 600; fill: #ea580c; }
      .box-title { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
      .box-text { font-family: Arial, sans-serif; font-size: 20px; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 17px; fill: #374151; }
      .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #475569; }
      .box { fill: #ffffff; stroke: #1e3a8a; stroke-width: 3; rx: 12; }
      .head { fill: #1e3a8a; }
      .orange-box { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; rx: 12; }
      .orange-head { fill: #ea580c; }
      .soft { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .arrow { stroke: #1f2937; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .orange-arrow { stroke: #ea580c; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="68" text-anchor="middle" class="title">Kiến trúc final model YOLO11x Fire/Smoke</text>
  <text x="800" y="106" text-anchor="middle" class="subtitle">Mục tiêu: train 1 model cuối duy nhất, mAP@50 ≥ 70%</text>

  <g transform="translate(45,165)">
    <rect class="box" width="255" height="250"/>
    <rect class="head" width="255" height="54" rx="12"/>
    <text x="20" y="36" class="box-title">1. Dữ liệu đầu vào</text>
    <text x="26" y="92" class="box-text">• Kaggle ảnh thô</text>
    <text x="26" y="132" class="box-text">• Google Images</text>
    <text x="26" y="172" class="box-text">• Ngõ hẻm VN</text>
    <text x="26" y="212" class="box-text">• Hard negatives</text>
  </g>

  <line class="arrow" x1="315" y1="290" x2="370" y2="290"/>

  <g transform="translate(385,165)">
    <rect class="box" width="270" height="250"/>
    <rect class="head" width="270" height="54" rx="12"/>
    <text x="18" y="36" class="box-title">2. Annotation mask</text>
    <text x="28" y="93" class="box-text">• Polygon fire</text>
    <text x="28" y="133" class="box-text">• Polygon smoke</text>
    <text x="28" y="173" class="box-text">• QA nhãn</text>
    <text x="28" y="213" class="small">Mask chỉ dùng làm nhãn gốc</text>
  </g>

  <line class="arrow" x1="670" y1="290" x2="725" y2="290"/>

  <g transform="translate(740,165)">
    <rect class="box" width="285" height="250"/>
    <rect class="head" width="285" height="54" rx="12"/>
    <text x="18" y="36" class="box-title">3. Tiền xử lý dữ liệu</text>
    <text x="28" y="93" class="box-text">• SHA1 exact duplicate</text>
    <text x="28" y="133" class="box-text">• dHash near-duplicate</text>
    <text x="28" y="173" class="box-text">• Split chống leakage</text>
    <text x="28" y="213" class="box-text">• Train-only slicing</text>
  </g>

  <line class="arrow" x1="1040" y1="290" x2="1095" y2="290"/>

  <g transform="translate(1110,165)">
    <rect class="orange-box" width="330" height="250"/>
    <rect class="orange-head" width="330" height="54" rx="12"/>
    <text x="18" y="36" class="box-title">4. Convert sang detect</text>
    <text x="28" y="95" class="box-text">• Mask → bbox</text>
    <text x="28" y="135" class="box-text">• Gộp fire + smoke</text>
    <text x="28" y="175" class="box-text">• 1 class: fire_smoke</text>
    <text x="28" y="215" class="small">Đầu ra: YOLO detect dataset</text>
  </g>

  <line class="orange-arrow" x1="1275" y1="430" x2="1275" y2="500"/>

  <g transform="translate(120,535)">
    <rect class="orange-box" width="1360" height="145"/>
    <rect class="orange-head" width="1360" height="50" rx="12"/>
    <text x="24" y="34" class="box-title">5. Final model: YOLO11x Detect 1-class fire_smoke</text>
    <g transform="translate(35,78)">
      <rect class="soft" width="190" height="44"/>
      <text x="95" y="29" text-anchor="middle" class="box-text">Input image</text>
    </g>
    <line class="arrow" x1="240" y1="100" x2="300" y2="100"/>
    <g transform="translate(315,78)">
      <rect class="soft" width="210" height="44"/>
      <text x="105" y="29" text-anchor="middle" class="box-text">Backbone YOLO11x</text>
    </g>
    <line class="arrow" x1="540" y1="100" x2="600" y2="100"/>
    <g transform="translate(615,78)">
      <rect class="soft" width="250" height="44"/>
      <text x="125" y="29" text-anchor="middle" class="box-text">Neck multi-scale fusion</text>
    </g>
    <line class="arrow" x1="880" y1="100" x2="940" y2="100"/>
    <g transform="translate(955,78)">
      <rect class="soft" width="205" height="44"/>
      <text x="102" y="29" text-anchor="middle" class="box-text">Detection head</text>
    </g>
    <line class="arrow" x1="1175" y1="100" x2="1235" y2="100"/>
    <g transform="translate(1250,78)">
      <rect class="soft" width="75" height="44"/>
      <text x="37" y="29" text-anchor="middle" class="box-text">BBox</text>
    </g>
  </g>

  <g transform="translate(120,720)">
    <rect class="box" width="425" height="105"/>
    <rect class="head" width="425" height="44" rx="12"/>
    <text x="18" y="30" class="box-title">6. Huấn luyện 2 stage</text>
    <text x="25" y="72" class="box-text">Stage 1: augmentation vừa phải</text>
    <text x="25" y="100" class="box-text">Stage 2: fine-tune no-mosaic, LR thấp</text>
  </g>

  <g transform="translate(590,720)">
    <rect class="box" width="385" height="105"/>
    <rect class="head" width="385" height="44" rx="12"/>
    <text x="18" y="30" class="box-title">7. Cấu hình compute</text>
    <text x="25" y="72" class="box-text">L4: imgsz 1024, batch 4</text>
    <text x="25" y="100" class="box-text">A100: imgsz 1280, batch 8</text>
  </g>

  <g transform="translate(1020,720)">
    <rect class="orange-box" width="460" height="105"/>
    <rect class="orange-head" width="460" height="44" rx="12"/>
    <text x="18" y="30" class="box-title">8. Đánh giá & triển khai</text>
    <text x="25" y="72" class="box-text">mAP@50, Precision, Recall, F1</text>
    <text x="25" y="100" class="box-text">Per-group eval, ONNX/TensorRT</text>
  </g>

  <line class="arrow" x1="800" y1="680" x2="800" y2="708"/>
  <line class="arrow" x1="545" y1="772" x2="575" y2="772"/>
  <line class="arrow" x1="975" y1="772" x2="1005" y2="772"/>

  <text x="800" y="872" text-anchor="middle" class="tiny">
    Ghi chú: segmentation mask là nhãn nguồn để tạo bbox; model train/deploy cuối là YOLO11x detect 1-class fire_smoke.
  </text>
</svg>
